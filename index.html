<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "source sans pro", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f5f0;
            color: #333;
        }
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #002147, #004080);
            color: #f8c471;
            text-align: center;
            padding: 20px;
            border-bottom: 5px solid #d4af37;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            margin: 0;
            font-weight: 700;
            padding-bottom: 0.3em;
        }
        .hero p {
            font-size: 1.5em;
            margin: 10px 0;
            font-weight: 400;
        }
        .hero .no-event {
            font-size: 2em;
            font-weight: 500;
            margin-top: 20px;
        }
        .hero .title {
            font-family: 'Playfair Display', serif;
        }
        .hero .participant {
            font-size: 1.2em;
            font-weight: 200;
            margin: 1em;
        }
        .hero .location {
            font-size: 1.2em;
            font-weight: 400;
            margin: 0;
        }
        .hero .date {
            font-size: 1.2em;
            font-weight: 400;
            margin: 0;
        }
        .calendar-container {
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            font-family: 'Roboto', sans-serif;
        }
        .calendar-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #002147;
        }
        .calendar-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .calendar-item {
            padding: 20px;
            border: 2px solid #d4af37;
            background: linear-gradient(135deg, #fff, #f8f5f0);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .calendar-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        .calendar-date {
            font-weight: 700;
            font-size: 1.5em;
            color: #002147;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
            font-weight: 300;
        }
        .event-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
        }
        .event-participant {
            font-size: 1em;
            color: #333;
            margin-bottom: 5px;
        }
        .event-location {
            font-size: 1em;
            color: #555;
        }
    </style>
</head>
<body>

<div class="hero" id="hero" style="position: relative;">
    <p style="position: absolute;bottom: 40px;font-size: 0.8em;font-weight: 400;color: #f8c471;">
        Skrolla ned för att se vad som kommer härnäst
    </p>
</div>

<div class="calendar-container">
    <h2 class="calendar-title">Kommande kungliga uppdrag</h2>
    <div class="calendar-list" id="calendar-list"></div>
</div>

<script>
    const monthMap = {
        '01': 'januari', '02': 'februari', '03': 'mars', '04': 'april',
        '05': 'maj', '06': 'juni', '07': 'juli', '08': 'augusti',
        '09': 'september', '10': 'oktober', '11': 'november', '12': 'december',
    };

    function formatDate(isoDate) {
        const parts = isoDate.split('-');
        if (parts.length !== 3) return isoDate;
        const day = parts[2].replace(/^0/, '');
        const month = monthMap[parts[1]] || parts[1];
        return `${day} ${month}`;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    fetch('data.json')
        .then(r => r.json())
        .then(events => {
            const today = new Date().toISOString().slice(0, 10);
            const hero = document.getElementById('hero');
            const list = document.getElementById('calendar-list');

            const sortedEvents = events.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));

            let currentEvent = null;
            const upcomingEvents = [];

            for (const event of sortedEvents) {
                if (event.date === today) {
                    currentEvent = event;
                } else if (event.date > today) {
                    upcomingEvents.push(event);
                }
            }

            // Render hero
            const scrollHint = hero.querySelector('p');
            if (currentEvent) {
                hero.insertAdjacentHTML('afterbegin', `
                    <h1>Dagens kungliga uppdrag</h1>
                    <p class="title"><strong>${escapeHtml(currentEvent.title)}</strong></p>
                    ${currentEvent.participant ? `<p class="participant">${escapeHtml(currentEvent.participant)}</p>` : ''}
                    ${currentEvent.location ? `<p class="location">${escapeHtml(currentEvent.location)}</p>` : ''}
                    ${currentEvent.date ? `<p class="date">${formatDate(currentEvent.date)}</p>` : ''}
                `);
            } else {
                hero.insertAdjacentHTML('afterbegin', '<h1>Inget kungligt uppdrag idag</h1><p class="no-event"></p>');
            }

            // Render upcoming list
            for (const event of upcomingEvents) {
                list.insertAdjacentHTML('beforeend', `
                    <div class="calendar-item">
                        <div class="calendar-date"><strong>${formatDate(event.date)}</strong></div>
                        <div class="event-title">${escapeHtml(event.title)}</div>
                        ${event.participant ? `<div class="event-participant">👑 ${escapeHtml(event.participant)}</div>` : ''}
                        ${event.location ? `<div class="event-location">📍 ${escapeHtml(event.location)}</div>` : ''}
                    </div>
                `);
            }
        });
</script>
</body>
</html>
